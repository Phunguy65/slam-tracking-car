; ═══════════════════════════════════════════════════════════════════════════════
; SLAM Tracking Car — ESP32 Firmware (PlatformIO + micro-ROS)
;
; Environments:
;   esp32_main       — Main ESP32: motor control, servo, LDS02RR LiDAR, odometry
;   esp32_main_home  — Main ESP32 with .env.home config
;   esp32_main_lab   — Main ESP32 with .env.lab config
;   esp32_cam        — ESP32-CAM: MJPEG HTTP stream + micro-ROS telemetry
;   esp32_cam_home   — ESP32-CAM with .env.home config
;   esp32_cam_lab    — ESP32-CAM with .env.lab config
;
; Setup:
;   cp .env.example .env     # Copy and edit with your settings
;
; Build:   pio run -e esp32_main
; Upload:  pio run -e esp32_main -t upload
; Monitor: pio device monitor -e esp32_main
; ═══════════════════════════════════════════════════════════════════════════════

[platformio]
default_envs = esp32_main

; ── Shared settings ──────────────────────────────────────────────────────────
[env]
platform = espressif32@6.13.0           ; Arduino Core 2.0.17, ESP-IDF 4.4.7
framework = arduino
monitor_speed = 115200

; Pre-build scripts:
;   1. clean_ros_env.py — Remove ROS2 env vars to prevent micro_ros_platformio conflicts
;   2. load_env.py — Load configuration from .env file into build flags
extra_scripts =
    pre:scripts/clean_ros_env.py
    pre:scripts/load_env.py

; Default env file (can be overridden per environment)
custom_env_file = .env

build_flags =
    -D MICRO_ROS_TRANSPORT_WIFI

build_type = debug
monitor_filters = esp32_exception_decoder

lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
    kaiaai/LDS @ ^0.6.3                 ; LDS02RR driver
    electroniccats/MPU6050 @ ^1.4.4     ; IMU (I2C + DMP)
    madhephaestus/ESP32Servo @ ^3.0.6   ; Servo pan-tilt control

board_microros_distro = humble
board_microros_transport = wifi
board_microros_user_meta = micro_ros.meta

; ── ESP32 Main (motor, servo, LiDAR, odom) ──────────────────────────────────
[env:esp32_main]
board = esp32dev
build_src_filter = +<*> -<cam_main.cpp>
build_flags =
    ${env.build_flags}
    -D BOARD_ESP32_MAIN

; ESP32 Main — Home environment
[env:esp32_main_home]
extends = env:esp32_main
custom_env_file = .env.home

; ESP32 Main — Lab environment
[env:esp32_main_lab]
extends = env:esp32_main
custom_env_file = .env.lab

; ── ESP32-CAM (camera stream + micro-ROS telemetry) ─────────────────────────
[env:esp32_cam]
board = esp32cam
build_src_filter = +<*> -<main.cpp>
build_flags =
    ${env.build_flags}
    -D BOARD_ESP32_CAM
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

monitor_speed = 115200
upload_speed = 115200

lib_deps =
    ${env.lib_deps}
    espressif/esp32-camera @ >=2.0.4    ; ESP32-CAM camera driver

; ESP32-CAM — Home environment
[env:esp32_cam_home]
extends = env:esp32_cam
custom_env_file = .env.home

; ESP32-CAM — Lab environment
[env:esp32_cam_lab]
extends = env:esp32_cam
custom_env_file = .env.lab
