enrollment_node:
  ros__parameters:
    db_path: "~/.slam_car/face_db.sqlite"
    embedding_threshold: 0.6
    scan_frames: 10

cam_bridge_node:
  ros__parameters:
    camera_fov_horizontal_deg: 62.0
    flip_image: true

person_tracker_node:
  ros__parameters:
    db_path: "~/.slam_car/face_db.sqlite"
    embedding_threshold: 0.6
    image_topic: "/camera/image_raw"
    body_confidence_threshold: 0.5
    confidence_decay_rate: 0.1
    camera_fov_horizontal_deg: 62.0
    range_cone_half_angle_rad: 0.17

tracking_controller_node:
  ros__parameters:
    pid_servo_kp: 2.0
    pid_servo_ki: 0.0
    pid_servo_kd: 0.1
    pid_wheel_yaw_kp: 0.5
    pid_wheel_yaw_ki: 0.0
    pid_wheel_yaw_kd: 0.05
    pid_linear_kp: 0.3
    pid_linear_ki: 0.0
    pid_linear_kd: 0.05
    max_servo_angle: 1.57
    servo_handoff_threshold: 0.52
    max_linear_speed: 0.3
    max_angular_speed: 1.0
    target_distance_min: 0.15
    target_distance_max: 0.25
    front_safety_distance: 0.15
    front_safety_half_arc_rad: 0.35
    search_scan_duration: 6.0
    lost_timeout: 2.0
    target_confirm_frames: 3
